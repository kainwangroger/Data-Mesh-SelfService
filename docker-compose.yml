x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

volumes:
  postgres_domains_data:
  minio_data:
  airflow_postgres_data:

networks:
  datamesh:
    driver: bridge

# ─────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────
services:

  # ── PostgreSQL multi-domaine ───────────────
  postgres-domains:
    image: postgres:16-alpine
    container_name: datamesh-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: datamesh
    ports:
      - "5432:5432"
    volumes:
      - postgres_domains_data:/var/lib/postgresql/data
      - ./scripts/init-domains.sql:/docker-entrypoint-initdb.d/init-domains.sql
    networks:
      - datamesh
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (Data Lake) ─────────────────────
  minio:
    image: minio/minio:latest
    container_name: datamesh-minio
    command: server /data --console-address ":9003"
    ports:
      - "9002:9000"
      - "9003:9003"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    networks:
      - datamesh
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow ────────────────────────────────
  airflow-postgres:
    image: postgres:16-alpine
    container_name: datamesh-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - datamesh
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: datamesh-airflow-init
    entrypoint: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com
      "
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    volumes:
      - ./platform/governance/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
    depends_on:
      airflow-postgres:
        condition: service_healthy
    networks:
      - datamesh

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: datamesh-airflow-web
    entrypoint: airflow webserver
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__WEBSERVER__WORKER_TIMEOUT: "300"
    volumes:
      - ./platform/governance/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - datamesh
    logging: *default-logging

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: datamesh-airflow-sched
    entrypoint: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    volumes:
      - ./platform/governance/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - datamesh
    logging: *default-logging

  # ── Governance API ─────────────────────────
  governance-api:
    build:
      context: .
      dockerfile: Dockerfile.governance
    container_name: datamesh-governance
    ports:
      - "8100:8100"
    volumes:
      - ./platform/governance:/app
    environment:
      POSTGRES_HOST: postgres-domains
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      GOVERNANCE_DB: sqlite:///data/governance.db
    depends_on:
      postgres-domains:
        condition: service_healthy
    networks:
      - datamesh
    logging: *default-logging

  # ── Streamlit Portal ──────────────────────
  portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
    container_name: datamesh-portal
    ports:
      - "8501:8501"
    volumes:
      - ./platform/portal:/app
    environment:
      GOVERNANCE_API_URL: http://governance-api:8100
      POSTGRES_HOST: postgres-domains
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    depends_on:
      - governance-api
    networks:
      - datamesh
    logging: *default-logging
