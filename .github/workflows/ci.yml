name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install ruff==0.9.6
      - run: ruff check platform/governance/ --output-format=github

  test-governance:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: mkdir -p data
      - run: python -m pytest tests/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: [lint, test-governance]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Governance API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.governance
          tags: datamesh-governance:latest
      - name: Build Portal
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.portal
          tags: datamesh-portal:latest
